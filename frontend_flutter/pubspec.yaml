name: hackit_mvp_flutter
description: Flutter frontend migration for Hackit MVP
publish_to: "none"
version: 0.1.0
environment:
  sdk: ">=3.2.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  # Architecture & DI
  get_it: ^7.6.7
  injectable: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.8.1
  flutter_hooks: ^0.20.5
  
  # État & Reactive
  flutter_bloc: ^8.1.3
  rxdart: ^0.27.7
  
  # Réseau & Cache
  dio: ^5.4.0
  retrofit: ^4.5.0
  hive: ^2.2.3
  cached_network_image: ^3.3.1
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  connectivity_plus: ^5.0.2
  
  # Analytics & Monitoring
  firebase_core: ^2.24.2
  firebase_analytics: ^10.8.0
  sentry_flutter: ^7.10.1
  
  # Utilitaires
  dartz: ^0.10.1
  logger: ^2.0.2+1
  equatable: ^2.0.5
  cupertino_icons: ^1.0.5
  provider: ^6.0.5
  url_launcher: ^6.1.12
  shared_preferences: ^2.2.0
  device_info_plus: ^9.0.3
  flutter_native_splash: ^2.3.2
  flutter_secure_storage: ^9.0.0
  flutter_blurhash: ^0.8.2
  flutter_colorpicker: ^1.0.3
  dynamic_color: ^1.6.8
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  app_links: ^3.5.0
  encrypt: ^5.0.3
  crypto: ^3.0.3
  uuid: ^4.2.1
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
    
  # Générateurs de code
  build_runner: ^2.4.6
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  retrofit_generator: ^7.0.8
  
  # Tests
  mockito: ^5.4.2
  alchemist: ^0.7.0
  mocktail: ^1.0.0
  
  # Linting & Analysis
  flutter_lints: ^3.0.1
  custom_lint: ^0.5.7
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

dependency_overrides:
  # (empty) Previously used to pin web; removed after upgrading Flutter SDK.
