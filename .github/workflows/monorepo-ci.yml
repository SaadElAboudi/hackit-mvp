name: Monorepo CI

name: Monorepo CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: monorepo-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      flutter: ${{ steps.filter.outputs.flutter }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - name: Determine changed paths
        id: filter
        run: |
          echo "backend=false" >> $GITHUB_OUTPUT
          echo "frontend=false" >> $GITHUB_OUTPUT
          echo "flutter=false" >> $GITHUB_OUTPUT
          git fetch --depth=50 origin main || true
          BASE="origin/main"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          fi
          CHANGED=$(git diff --name-only "$BASE" || true)
          echo "Changed files:\n$CHANGED"
          if echo "$CHANGED" | grep -q '^backend/'; then echo "backend=true" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q '^frontend_flutter/'; then echo "flutter=true" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q '^frontend/\|^App.js\|^package.json'; then echo "frontend=true" >> $GITHUB_OUTPUT; fi

  backend:
    runs-on: ubuntu-latest
    defaults:
    needs: changed
    if: ${{ needs.changed.outputs.backend == 'true' || github.event_name == 'pull_request' }}
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: npm ci || npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Coverage
        run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/**

      - name: Upload coverage to Codecov (non-blocking)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
  flutter:
  flutter:
    runs-on: ubuntu-latest
    defaults:
    needs: changed
    if: ${{ needs.changed.outputs.flutter == 'true' || github.event_name == 'pull_request' }}
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Flutter doctor
        run: flutter doctor -v
      - name: Install deps
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test (smoke only)
        shell: bash
        run: |
          if [ -f test/smoke_main_test.dart ]; then
            flutter test test/smoke_main_test.dart -r expanded
          else
            echo "Smoke test not found, running no tests";
          fi

  frontend:
    name: Expo frontend (Jest)
    runs-on: ubuntu-latest
    needs: changed
    if: ${{ needs.changed.outputs.frontend == 'true' || github.event_name == 'pull_request' }}
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install root deps
        run: npm ci || npm install --no-audit --no-fund
      - name: Run Jest if present
        shell: bash
        run: |
          if npx --yes jest --version >/dev/null 2>&1; then
            if ls __tests__/*.test.* >/dev/null 2>&1 || ls **/*.test.* >/dev/null 2>&1; then
              npm test --silent || npm test --silent -- --runInBand
            else
              echo "No Jest tests found, skipping";
            fi
          else
            echo "Jest not installed at root, skipping";
          fi

  all-green:
    name: All checks
    needs: [changed, backend, flutter, frontend]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Monorepo CI all jobs succeeded."
