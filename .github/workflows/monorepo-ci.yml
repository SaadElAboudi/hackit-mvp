name: Monorepo CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: monorepo-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      flutter: ${{ steps.filter.outputs.flutter }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - name: Determine changed paths
        id: filter
        run: |
          echo "backend=false" >> $GITHUB_OUTPUT
          echo "frontend=false" >> $GITHUB_OUTPUT
          echo "flutter=false" >> $GITHUB_OUTPUT
          git fetch --no-tags --prune --progress --depth=50 origin +refs/heads/*:refs/remotes/origin/* || true
          BASE=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
          fi
          if [ -z "$BASE" ]; then
            BASE=$(git rev-parse HEAD^ 2>/dev/null || true)
          fi
          if [ -z "$BASE" ]; then
            echo "Could not determine base commit; running all jobs by default"
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "flutter=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD || true)
          printf "Changed files:\n%s\n" "$CHANGED"
          if echo "$CHANGED" | grep -q '^backend/'; then echo "backend=true" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q '^frontend_flutter/'; then echo "flutter=true" >> $GITHUB_OUTPUT; fi
          if echo "$CHANGED" | grep -q '^frontend/\|^App.js\|^package.json'; then echo "frontend=true" >> $GITHUB_OUTPUT; fi

  backend:
    name: Backend (Node 20)
    needs: changed
    if: ${{ needs.changed.outputs.backend == 'true' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: npm ci || npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Coverage
        run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/**

  flutter:
    name: Flutter (smoke)
    runs-on: ubuntu-latest
    needs: changed
    if: ${{ needs.changed.outputs.flutter == 'true' || github.event_name == 'pull_request' }}
    defaults:
      run:
        working-directory: frontend_flutter
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Cache pub & dart server
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.dartServer
          key: ${{ runner.os }}-pub-${{ hashFiles('frontend_flutter/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Flutter doctor
        run: flutter doctor -v
      - name: Install deps
        run: flutter pub get
      - name: Analyze (non-blocking)
        continue-on-error: true
        run: flutter analyze || true
      - name: Test (smoke only)
        shell: bash
        run: |
          if [ -f test/smoke_main_test.dart ]; then
            flutter test test/smoke_main_test.dart -r expanded
          else
            echo "Smoke test not found, running no tests";
          fi
      - name: Coverage (smoke)
        shell: bash
        run: |
          if [ -f test/smoke_main_test.dart ]; then
            flutter test --coverage test/smoke_main_test.dart -r compact || true
          else
            echo "Skipping coverage; no smoke test file";
          fi
      - name: Upload Flutter coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: frontend_flutter/coverage/**
          if-no-files-found: ignore

  frontend:
    name: Expo frontend (Jest)
    runs-on: ubuntu-latest
    needs: changed
    if: ${{ needs.changed.outputs.frontend == 'true' || github.event_name == 'pull_request' }}
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install root deps
        run: npm ci || npm install --no-audit --no-fund
      - name: Run Jest if present
        shell: bash
        run: |
          if npx --yes jest --version >/dev/null 2>&1; then
            if ls __tests__/*.test.* >/dev/null 2>&1 || ls **/*.test.* >/dev/null 2>&1; then
              npm test --silent -- --coverage || npm test --silent -- --runInBand --coverage
            else
              echo "No Jest tests found, skipping";
            fi
          else
            echo "Jest not installed at root, skipping";
          fi

      - name: Upload Frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/**
          if-no-files-found: ignore

  coverage:
    name: Coverage aggregation & upload
    runs-on: ubuntu-latest
    needs: [backend, flutter, frontend]
    steps:
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: coverage/all/backend
        continue-on-error: true
      - name: Download flutter coverage
        uses: actions/download-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/all/flutter
        continue-on-error: true
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/all/frontend
        continue-on-error: true
      - name: List coverage files (optional)
        run: |
          echo "--- coverage/all contents ---"
          find coverage/all -type f -name "*.info" -print || true
      - name: Upload to Codecov (merged)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            coverage/all/**/lcov.info
          flags: monorepo
          name: monorepo-coverage
          fail_ci_if_error: false

