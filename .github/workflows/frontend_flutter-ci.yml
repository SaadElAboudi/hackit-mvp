name: Frontend Flutter CI (widgets)

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend_flutter/**'
      - '.github/workflows/frontend_flutter-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend_flutter/**'
      - '.github/workflows/frontend_flutter-ci.yml'

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_flutter
    env:
      # Ensure consistent locale and no analytics noise
      CI: 'true'
      PUB_ENVIRONMENT: 'github-ci'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter version
        run: flutter --version

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.dartServer
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Ensure formatting (fail on diff)
        run: |
          flutter format --set-exit-if-changed .

      - name: Run widget tests (stable subset)
        run: |
          # Fail fast if directory missing (future-proof) then run subset
          test -d test/widgets || { echo "Expected test/widgets directory missing"; exit 1; }
          flutter test -r compact test/widgets
      - name: Report minimal coverage (optional, non-blocking)
        continue-on-error: true
        run: |
          flutter test --coverage test/widgets || true
          if [ -f coverage/lcov.info ]; then echo "Generated coverage"; fi
