name: Backend REAL CI

on:
  workflow_dispatch:
  schedule:
    # Run once daily at 02:15 UTC to exercise the real YouTube path
    - cron: '15 2 * * *'

jobs:
  real-or-notice:
    name: Backend REAL smoke or notice
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Evaluate secret presence
        id: secretcheck
        run: |
          if [ -n "${{ secrets.YT_API_KEY }}" ]; then
            echo "has_secret=true" >> $GITHUB_OUTPUT
          else
            echo "has_secret=false" >> $GITHUB_OUTPUT
          fi
      - name: Install backend deps
        if: steps.secretcheck.outputs.has_secret == 'true'
        working-directory: backend
        run: npm ci || npm install --no-audit --no-fund
      - name: Start backend (REAL mode)
        if: steps.secretcheck.outputs.has_secret == 'true'
        working-directory: backend
        env:
          PORT: '3000'
          MOCK_MODE: 'false'
          REAL_MODE: 'true'
          ALLOW_FALLBACK: 'true'
          USE_GEMINI: 'false'
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: |
          nohup npm start > server.log 2>&1 &
          echo $! > server.pid
      - name: Wait for health
        if: steps.secretcheck.outputs.has_secret == 'true'
        working-directory: backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health >/dev/null; then
              echo "Server is healthy"; exit 0; fi; sleep 1; done; \
          echo "Server did not become healthy in time"; \
          echo "--- server.log ---"; (test -f server.log && tail -n 200 server.log) || true; \
          exit 1
      - name: Run smoke test (REAL_MODE)
        if: steps.secretcheck.outputs.has_secret == 'true'
        working-directory: backend
        env:
          REAL_MODE: 'true'
          SMOKE_TIMEOUT_MS: '12000'
        run: npm run test:smoke || (echo "REAL smoke failed" && (test -f server.log && tail -n 200 server.log || true) && exit 1)
      - name: Teardown backend
        if: steps.secretcheck.outputs.has_secret == 'true' && always()
        working-directory: backend
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true; sleep 2;
          fi
          pkill -f "node src/index.js" || true
          echo "--- server.log (last 200 lines) ---"; (test -f server.log && tail -n 200 server.log) || true
      - name: Notice (secret missing)
        if: steps.secretcheck.outputs.has_secret == 'false'
        run: |
          echo "REAL CI: YT_API_KEY secret NOT configured; running in notice-only mode."
          echo "Add 'YT_API_KEY' in repository secrets to enable real YouTube smoke path."
