name: Backend REAL CI

on:
  workflow_dispatch:
  schedule:
    # Run once daily at 02:15 UTC to exercise the real YouTube path
    - cron: '15 2 * * *'

jobs:
  real-smoke:
    # Skip this job entirely if no YT_API_KEY is configured to avoid red CI noise
    if: ${{ secrets.YT_API_KEY != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Start backend (REAL mode)
        working-directory: backend
        env:
          PORT: '3000'
          MOCK_MODE: 'false'
          REAL_MODE: 'true'
          ALLOW_FALLBACK: 'true'
          USE_GEMINI: 'false'
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: |
          nohup npm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for health
        working-directory: backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health >/dev/null; then
              echo "Server is healthy"; exit 0; fi; sleep 1; done; \
          echo "Server did not become healthy in time"; \
          echo "--- server.log ---"; (test -f server.log && tail -n 200 server.log) || true; \
          exit 1

      - name: Run smoke test (REAL_MODE)
        working-directory: backend
        env:
          REAL_MODE: 'true'
          SMOKE_TIMEOUT_MS: '12000'
        run: npm run test:smoke

      - name: Teardown backend
        if: always()
        working-directory: backend
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true; sleep 2; 
          fi
          pkill -f "node src/index.js" || true
          echo "--- server.log (last 200 lines) ---"; (test -f server.log && tail -n 200 server.log) || true

  notice-no-secret:
    # Provide a neutral pass with clear notice when secret is missing
    if: ${{ secrets.YT_API_KEY == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "REAL CI skipped: YT_API_KEY secret is not configured."
          echo "Add repository secret YT_API_KEY to enable exercising the production YouTube API path."
