name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-unit:
    name: Backend unit/integration tests (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (ci)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Node version check
        run: node scripts/checkNodeVersion.js || exit 1

      - name: Run node tests
        env:
          NODE_ENV: test
        run: npm test

      - name: Run coverage
        env:
          NODE_ENV: test
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

      - name: Install jq (for audit parsing)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Audit (fail on high severity)
        run: |
          npm audit --omit=dev --json > audit.json || true
          cat audit.json | jq '.metadata.vulnerabilities' || true
          HIGH=$(cat audit.json | jq '.metadata.vulnerabilities.high')
          CRITICAL=$(cat audit.json | jq '.metadata.vulnerabilities.critical')
          if [ "$HIGH" != "0" ] || [ "$CRITICAL" != "0" ]; then echo "High/Critical vulnerabilities found"; exit 1; fi

  backend-smoke:
    name: Backend smoke (Node 20)
    needs: backend-unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (ci)
        run: npm ci

      - name: Node version check
        run: node scripts/checkNodeVersion.js || exit 1

      - name: Start server (MOCK_MODE)
        run: |
          NODE_ENV=test MOCK_MODE=true USE_GEMINI=false USE_GEMINI_REFORMULATION=false node src/index.js &
          echo $! > server.pid
          sleep 3

      - name: Smoke test /api/search
        run: |
          npm run test:smoke || (echo "Smoke test failed, printing server.log" && (test -f server.log && tail -n 200 server.log || true) && exit 1)

      - name: Shutdown server
        if: always()
        run: |
          if [ -f server.pid ]; then kill $(cat server.pid) || true; fi
          (test -f server.log && echo "--- server.log (last 100 lines) ---" && tail -n 100 server.log) || true
